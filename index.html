<!DOCTYPE html>
<html lang="es">
  <head>

  <body>
    <div id="root"></div>
    <noscript><div style="padding:20px;color:red;">⚠️ JavaScript required</div></noscript>
    <script>window.onerror=function(m,s,l,c,e){var r=document.getElementById('root');r.innerHTML='<div style="color:red;padding:20px;font-family:monospace;background:white;"><h2>JS Error</h2><pre style="white-space:pre-wrap">'+m+'\n'+(e&&e.stack||'')+'</pre></div>';return false};setTimeout(function(){var r=document.getElementById('root');console.log('ROOT innerHTML after 3s:',r.innerHTML.slice(0,200));if(!r.innerHTML.trim()||r.innerHTML==='\n      '){r.innerHTML='<div style="color:#d4a853;padding:40px;font-family:monospace;background:#0a0a0a;min-height:100vh;"><h1>Diagnóstico: root vacío</h1><p>React montó pero no renderizó contenido.</p><p>RouterProvider, QueryClientProvider y createRoot están en el bundle.</p></div>';}},3000);</script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
